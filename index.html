<!DOCTYPE html>
<html>
<head>
  <title>Interactive Map</title>
  <meta charset='utf-8'>
  <meta name='viewport' content='initial-scale=1.0, user-scalable=no'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.1/leaflet.css'>
  <link rel='stylesheet' href='https://cdn.rawgit.com/ardhi/Leaflet.MousePosition/master/src/L.Control.MousePosition.css'>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.1/leaflet.js'></script>
  <script src='https://cdn.rawgit.com/ardhi/Leaflet.MousePosition/master/src/L.Control.MousePosition.js'></script>

  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; }

    /* ── Toolbar ── */
    #toolbar {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .toolbar-btn {
      padding: 6px 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 4px;
      background: rgba(20, 20, 30, 0.82);
      color: #e8dfc8;
      font-family: 'Georgia', serif;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
    }
    .toolbar-btn:hover { background: rgba(40,40,55,0.95); border-color: rgba(255,255,255,0.45); }
    .toolbar-btn.active { background: rgba(180,140,80,0.35); border-color: rgba(200,160,90,0.7); color: #f5e8c0; }

    /* ── Custom Leaflet Popup ── */
    .leaflet-popup-content-wrapper {
      background: rgba(15, 13, 22, 0.96);
      border: 1px solid rgba(180, 140, 80, 0.4);
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      color: #d8cdb8;
      font-family: 'Georgia', serif;
      padding: 0;
      overflow: hidden;
      min-width: 240px;
      max-width: 300px;
    }
    .leaflet-popup-tip { background: rgba(15,13,22,0.96); }
    .leaflet-popup-close-button { color: #999 !important; top: 8px !important; right: 10px !important; font-size: 18px !important; }
    .leaflet-popup-close-button:hover { color: #e8dfc8 !important; }
    .leaflet-popup-content { margin: 0 !important; width: 100% !important; }

    /* ── Popup Contents ── */
    .pin-popup { width: 100%; }
    .pin-popup-image {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
    }
    .pin-popup-image-placeholder {
      width: 100%;
      height: 80px;
      background: linear-gradient(135deg, rgba(40,30,20,0.8), rgba(20,15,30,0.8));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      opacity: 0.5;
    }
    .pin-popup-body { padding: 12px 14px 14px; }
    .pin-popup-type {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pin-popup-title {
      font-size: 15px;
      font-weight: bold;
      color: #f0e6cc;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .pin-popup-description {
      font-size: 12px;
      line-height: 1.6;
      color: #b0a898;
    }
    .pin-popup-tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .pin-popup-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #888;
      letter-spacing: 0.5px;
    }

    /* ── Pin type colors ── */
    .type-location { color: #7ec8a0; }
    .type-event    { color: #d4895a; }
    .type-character{ color: #8fa8d4; }
    .type-default  { color: #c8c0b0; }

    /* ── Legend ── */
    #legend {
      position: absolute;
      bottom: 28px;
      left: 12px;
      z-index: 1000;
      background: rgba(15,13,22,0.85);
      border: 1px solid rgba(180,140,80,0.3);
      border-radius: 6px;
      padding: 10px 14px;
      color: #c8bfaa;
      font-family: 'Georgia', serif;
      font-size: 11px;
      backdrop-filter: blur(4px);
    }
    #legend h4 { margin: 0 0 8px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-weight: normal; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<div id='map'></div>

<!-- Toolbar -->
<div id='toolbar'>
  <button class='toolbar-btn active' id='filter-all'    onclick='setFilter("all")'>All Pins</button>
  <button class='toolbar-btn'        id='filter-location' onclick='setFilter("location")'>📍 Locations</button>
  <button class='toolbar-btn'        id='filter-event'    onclick='setFilter("event")'>⚔️ Events</button>
  <button class='toolbar-btn'        id='filter-character' onclick='setFilter("character")'>👤 Characters</button>
  <button class='toolbar-btn'        id='btn-reset'       onclick='resetView()'>Reset View</button>
</div>

<!-- Legend -->
<div id='legend'>
  <h4>Legend</h4>
  <div class='legend-row'><div class='legend-dot' style='background:#7ec8a0'></div> Location</div>
  <div class='legend-row'><div class='legend-dot' style='background:#d4895a'></div> Event</div>
  <div class='legend-row'><div class='legend-dot' style='background:#8fa8d4'></div> Character</div>
</div>

<script>
  /* ── Map init ── */
  var mapMinZoom = 2;
  var mapMaxZoom = 6;
  var map = L.map('map');

  L.tileLayer('tiles/{z}/{x}/{y}.jpg', {
    minZoom: mapMinZoom,
    maxZoom: mapMaxZoom,
    attribution: 'Created with <a href="https://github.com/battosey/mapTailor/wiki" target="_blank">MapTailor</a>',
    noWrap: true,
    tms: false
  }).addTo(map);

  var northWest = L.latLng(+90, -180);
  var southEast = L.latLng(-90, +180);
  var bounds    = L.latLngBounds(northWest, southEast);

  function resetView() { map.fitBounds(bounds); }
  resetView();

  L.control.mousePosition().addTo(map);

  /* ── Pin config ── */
  var PIN_CONFIG = {
    location:  { color: '#7ec8a0', emoji: '📍' },
    event:     { color: '#d4895a', emoji: '⚔️' },
    character: { color: '#8fa8d4', emoji: '👤' },
    default:   { color: '#c8c0b0', emoji: '📌' }
  };

  /* ── SVG icon factory ── */
  function makeIcon(type) {
    var cfg = PIN_CONFIG[type] || PIN_CONFIG.default;
    var svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
        <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/></filter>
        <path filter="url(#s)" d="M14 0C7.4 0 2 5.4 2 12c0 9 12 24 12 24S26 21 26 12C26 5.4 20.6 0 14 0z"
          fill="${cfg.color}" stroke="rgba(0,0,0,0.4)" stroke-width="1.2"/>
        <circle cx="14" cy="12" r="5.5" fill="rgba(0,0,0,0.25)"/>
        <circle cx="14" cy="12" r="4" fill="rgba(255,255,255,0.18)"/>
      </svg>`;
    return L.divIcon({
      html: svg,
      iconSize: [28, 36],
      iconAnchor: [14, 36],
      popupAnchor: [0, -38],
      className: ''
    });
  }

  /* ── Popup builder ── */
  function buildPopup(pin) {
    var cfg = PIN_CONFIG[pin.type] || PIN_CONFIG.default;
    var imgHtml = pin.image
      ? `<img class="pin-popup-image" src="${pin.image}" alt="${pin.name}" onerror="this.style.display='none'">`
      : `<div class="pin-popup-image-placeholder">${cfg.emoji}</div>`;

    var tagsHtml = (pin.tags || []).map(function(t) {
      return `<span class="pin-popup-tag">${t}</span>`;
    }).join('');

    return `
      <div class="pin-popup">
        ${imgHtml}
        <div class="pin-popup-body">
          <div class="pin-popup-type type-${pin.type}">${cfg.emoji} ${(pin.type || 'pin').toUpperCase()}</div>
          <div class="pin-popup-title">${pin.name}</div>
          <div class="pin-popup-description">${pin.description}</div>
          ${tagsHtml ? `<div class="pin-popup-tags">${tagsHtml}</div>` : ''}
        </div>
      </div>`;
  }

  /* ── Markers layer groups by type ── */
  var layerGroups = {};
  var allMarkers  = [];
  var activeFilter = 'all';

  /* ── Load pins.json ── */
  fetch('pins.json')
    .then(function(r) { return r.json(); })
    .then(function(pins) {
      pins.forEach(function(pin) {
        var type  = pin.type || 'default';
        var icon  = makeIcon(type);
        var marker = L.marker([pin.lat, pin.lng], { icon: icon })
          .bindPopup(buildPopup(pin), { maxWidth: 300, className: '' });

        marker._pinType = type;

        if (!layerGroups[type]) {
          layerGroups[type] = L.layerGroup().addTo(map);
        }
        layerGroups[type].addLayer(marker);
        allMarkers.push(marker);
      });
    })
    .catch(function(err) {
      console.warn('Could not load pins.json:', err);
    });

  /* ── Filter logic ── */
  function setFilter(filter) {
    activeFilter = filter;

    // Update toolbar button states
    document.querySelectorAll('.toolbar-btn').forEach(function(btn) {
      btn.classList.remove('active');
    });
    var activeBtn = document.getElementById('filter-' + filter);
    if (activeBtn) activeBtn.classList.add('active');

    // Show/hide layer groups
    Object.keys(layerGroups).forEach(function(type) {
      if (filter === 'all' || filter === type) {
        map.addLayer(layerGroups[type]);
      } else {
        map.removeLayer(layerGroups[type]);
      }
    });
  }
</script>
</body>
</html>
